name: Release collection

# Build, sign, and publish the xcomplai.cis_os Ansible collection as a GitHub
# Release asset. Mirrors the supply-chain shape of xcomplai/xc-aac-policies'
# release-bundle.yml (tag-triggered, sigstore/cosign keyless, signed tarball on
# a public GitHub Release), adapted for `ansible-galaxy collection build`.
#
# This repo IS the collection (galaxy.yml at the root), and it's public — so the
# build runs in-repo with no cross-repo clone and no token, and the resulting
# Release assets are downloadable token-free. That's the distribution point the
# xc-aac-ee execution environment consumes the collection from.
#
# Cut a release:
#   1. Bump `version:` in galaxy.yml (semver).
#   2. Tag it: `git tag vX.Y.Z && git push origin vX.Y.Z`  (tag must match galaxy.yml)
#   3. This workflow builds xcomplai-cis_os-X.Y.Z.tar.gz, signs it, and creates
#      the GitHub Release vX.Y.Z with the tarball + .sha256/.sig/.crt/.cosign.bundle.
#
# Optional: set an ANSIBLE_GALAXY_API_KEY secret to also publish to Ansible
# Galaxy (native `ansible-galaxy collection install xcomplai.cis_os`).

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Release tag to create / overwrite (e.g. v1.2.0). Must match galaxy.yml version.'
        required: true

permissions:
  contents: write   # create the Release + upload assets
  id-token: write   # mint the GitHub OIDC token cosign uses for keyless signing

jobs:
  build-and-release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve release tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install ansible-core
        run: |
          python -m pip install --upgrade pip
          pip install 'ansible-core>=2.16'
          ansible-galaxy --version

      - name: Install cosign
        uses: sigstore/cosign-installer@v3
        with:
          cosign-release: 'v2.4.1'

      - name: Assert tag matches galaxy.yml version
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          GV=$(awk '/^version:/{print $2; exit}' galaxy.yml)
          if [ "v${GV}" != "${TAG}" ]; then
            echo "::error::tag ${TAG} does not match galaxy.yml version v${GV} — bump galaxy.yml or fix the tag."
            exit 1
          fi
          echo "version=${GV}" >> "$GITHUB_ENV"

      - name: Build collection
        id: build
        run: |
          set -euo pipefail
          mkdir -p dist
          ansible-galaxy collection build . --output-path dist
          TARBALL="dist/xcomplai-cis_os-${version}.tar.gz"
          if [ ! -f "${TARBALL}" ]; then
            echo "::error::expected ${TARBALL} was not produced"; ls -la dist; exit 1
          fi
          echo "tarball=${TARBALL}" >> "$GITHUB_OUTPUT"
          ls -la dist/

      - name: Sign + checksum (cosign keyless)
        id: sign
        env:
          COSIGN_EXPERIMENTAL: "1"
          COSIGN_YES: "true"
        run: |
          set -euo pipefail
          F="${{ steps.build.outputs.tarball }}"
          sha256sum "${F}" | awk '{print $1}' > "${F}.sha256"
          cosign sign-blob \
            --bundle "${F}.cosign.bundle" \
            --output-signature "${F}.sig" \
            --output-certificate "${F}.crt" \
            "${F}"
          ls -la dist/ | sed 's/  */ /g'

      - name: Verify signature (self-check before publish)
        env:
          COSIGN_EXPERIMENTAL: "1"
        run: |
          set -euo pipefail
          F="${{ steps.build.outputs.tarball }}"
          cosign verify-blob \
            --signature "${F}.sig" \
            --certificate "${F}.crt" \
            --certificate-identity-regexp "https://github.com/${{ github.repository }}/.github/workflows/release-collection.yml@refs/(tags|heads)/.*" \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            "${F}"

      - name: Create / update Release + upload assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          set -euo pipefail
          TAG="${{ steps.tag.outputs.tag }}"
          NOTES=$(cat <<'NOTES_EOF'
          `xcomplai.cis_os` — CIS Operating Systems benchmark fact-gathering collection (`fact_contract/v1`). Built with `ansible-galaxy collection build`, sigstore-signed (keyless, GitHub OIDC).

          ## Install

          ```bash
          # From this release tarball (token-free — public repo):
          ansible-galaxy collection install https://github.com/${{ github.repository }}/releases/download/${{ steps.tag.outputs.tag }}/xcomplai-cis_os-${{ env.version }}.tar.gz
          ```

          The `xc-aac-ee` execution environment references this tarball URL in `execution-environment/requirements.yml`.

          ## Verify (cosign)

          ```bash
          cosign verify-blob \
            --signature xcomplai-cis_os-${{ env.version }}.tar.gz.sig \
            --certificate xcomplai-cis_os-${{ env.version }}.tar.gz.crt \
            --certificate-identity-regexp 'https://github.com/${{ github.repository }}/\.github/workflows/release-collection\.yml@refs/tags/v.*' \
            --certificate-oidc-issuer https://token.actions.githubusercontent.com \
            xcomplai-cis_os-${{ env.version }}.tar.gz
          ```
          NOTES_EOF
          )
          if gh release view "${TAG}" --repo "${{ github.repository }}" >/dev/null 2>&1; then
            echo "Release ${TAG} exists — uploading assets with --clobber"
            gh release upload "${TAG}" dist/* --repo "${{ github.repository }}" --clobber
            gh release edit "${TAG}" --repo "${{ github.repository }}" --notes "${NOTES}"
          else
            gh release create "${TAG}" \
              --repo "${{ github.repository }}" \
              --title "xcomplai.cis_os ${TAG}" \
              --notes "${NOTES}" \
              dist/*
          fi

      - name: Publish to Ansible Galaxy (if configured)
        env:
          GALAXY_KEY: ${{ secrets.ANSIBLE_GALAXY_API_KEY }}
        run: |
          set -euo pipefail
          if [ -z "${GALAXY_KEY:-}" ]; then
            echo "ANSIBLE_GALAXY_API_KEY not set — skipping Galaxy publish."
            exit 0
          fi
          ansible-galaxy collection publish "${{ steps.build.outputs.tarball }}" --api-key "${GALAXY_KEY}"
