---
# xcomplai.cis_os.gather — produce framework_facts for the CIS Operating
# Systems benchmark family.
#
# Single role per CIS benchmark SCOPE (per Tier 3.K scoping); per-target
# implementation dispatched via include_tasks based on the target host's
# distribution + version. Each per-target task file is independently
# versioned via the collection's overall semver.
#
# Output: sets `framework_facts` host fact in the fact_contract/v1 shape.
# See xcomplai/xc-aac:docs/architecture/FACT_CONTRACT.md for the contract.
#
# Status: v1.1.0 — refactored from v1.0.0's single-distro shape into the
# scoped collection model. RHEL 9 logic moved to tasks/redhat_9.yml. Other
# distros added in subsequent minor releases (each adds a tasks/<distro>.yml
# + extends the supported-targets dispatch list below).

- name: Initialise framework_facts accumulator
  ansible.builtin.set_fact:
    framework_facts: {}

# Compose the dispatch key from gathered facts. Operators can override by
# setting `cis_os_target_key` explicitly (useful for in-progress / alpha
# variants that don't auto-derive cleanly).
- name: Resolve per-target dispatch key
  ansible.builtin.set_fact:
    cis_os_target_key: >-
      {{ cis_os_target_key | default(
        ((ansible_facts['distribution'] | lower)
          | replace(' ', '_')
          | regex_replace('^red[_ -]?hat$', 'redhat'))
        + '_' +
        (ansible_facts['distribution_major_version'] | string)
      ) }}

- name: Assert the target is supported by this collection version
  ansible.builtin.assert:
    that:
      - cis_os_target_key in _cis_os_supported_targets
    fail_msg: >-
      xcomplai.cis_os v{{ ansible_collection_version | default('?') }} does
      not yet ship gather logic for target '{{ cis_os_target_key }}'.
      Supported in this release: {{ _cis_os_supported_targets | join(', ') }}.
      To extend: add roles/gather/tasks/{{ cis_os_target_key }}.yml + open
      a PR against xcomplai/xc-aac-cis-os.
  vars:
    # Targets shipped in this collection release. Each entry must have a
    # matching tasks/<key>.yml. Sorted for grep convenience.
    _cis_os_supported_targets:
      - redhat_9

- name: Dispatch to per-target gather tasks
  ansible.builtin.include_tasks: "{{ cis_os_target_key }}.yml"

- name: Gather summary
  ansible.builtin.debug:
    msg:
      - "xcomplai.cis_os.gather complete — target: {{ cis_os_target_key }}"
      - "framework_facts nouns gathered: {{ framework_facts.keys() | list | join(', ') }}"
